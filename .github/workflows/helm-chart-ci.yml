name: Helm chart CI

on:
  push:
    branches: [main]
    paths:
      - 'Chart.yaml'
      - 'values.yaml'
      - 'values/**'
      - 'README.md'
      - '.helmignore'
      - 'templates/**'
  pull_request:
    branches: [main]
    paths:
      - 'Chart.yaml'
      - 'values.yaml'
      - 'values/**'
      - 'README.md'
      - '.helmignore'
      - 'templates/**'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag override (e.g. prometheus-v1.0.0)'
        required: false

concurrency: helm-chart-prometheus

jobs:
  ci:
    permissions:
      contents: write
      pull-requests: read
    uses: expectedbehaviors/github-actions/.github/workflows/helm-chart-ci.yml@main
    secrets: inherit
    with:
      chart_path: .
      tag_prefix: prometheus-v
      helm_repositories: |
        prometheus-community=https://prometheus-community.github.io/helm-charts
      publish_enabled: false
      release_notes_enabled: true
      release_tag: ${{ github.event.inputs.release_tag || '' }}